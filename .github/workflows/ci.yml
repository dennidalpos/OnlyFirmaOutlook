name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore OnlyFirmaOutlook.sln

      - name: Build
        run: dotnet build OnlyFirmaOutlook.sln -c Release --no-restore

      - name: Test
        run: dotnet test OnlyFirmaOutlook.sln -c Release --no-build
