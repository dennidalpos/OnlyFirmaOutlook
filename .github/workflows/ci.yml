name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore OnlyFirmaOutlook.sln

      - name: Build
        run: dotnet build OnlyFirmaOutlook.sln -c Release --no-restore

      - name: Test
        run: dotnet test OnlyFirmaOutlook.sln -c Release --no-build

      - name: Verify Publish Script
        shell: pwsh
        run: |
          $presetPath = Join-Path $PWD "src/OnlyFirmaOutlook/media/ci-preset.rtf"
          try {
            Set-Content -Path $presetPath -Value "{\rtf1\ansi CI preset}"
            ./scripts/build.ps1 -Configuration Release -PublishMode FrameworkDependent -SkipTests

            $requiredPaths = @(
              "dist/OnlyFirmaOutlook.Launcher.exe",
              "dist/win-x86/OnlyFirmaOutlook.exe",
              "dist/win-x64/OnlyFirmaOutlook.exe",
              "dist/win-x86/media/ci-preset.rtf",
              "dist/win-x64/media/ci-preset.rtf"
            )

            foreach ($path in $requiredPaths) {
              if (-not (Test-Path $path)) {
                throw "Output mancante: $path"
              }
            }
          }
          finally {
            Remove-Item $presetPath -Force -ErrorAction SilentlyContinue
          }
